<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Portal Loop</title>
    <style>
        :root {
            --color-1: #6b21a8;
            /* Deep purple */
            --color-2: #a855f7;
            /* Primary purple */
            --color-3: #d8b4fe;
            /* Light purple */
            --bg: #09090b;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* SVG Filter for Liquid Effect */
        svg {
            position: absolute;
            width: 0;
            height: 0;
        }

        .portal-container {
            width: 100%;
            height: 100%;
            position: relative;
            background: radial-gradient(circle at center, var(--color-1) 0%, var(--bg) 70%);
            display: flex;
            align-items: center;
            justify-content: center;
            filter: url(#liquid-filter);
        }

        .portal-core {
            width: 800px;
            height: 800px;
            border-radius: 50%;
            background: conic-gradient(from 0deg,
                    var(--color-1),
                    var(--color-2),
                    var(--color-3),
                    var(--color-2),
                    var(--color-1));
            animation: spin 10s linear infinite;
            filter: blur(40px);
            opacity: 0.8;
            mix-blend-mode: screen;
        }

        .portal-core-inner {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, #fff 0%, var(--color-3) 40%, transparent 70%);
            animation: pulse-inner 4s ease-in-out infinite alternate, spin-reverse 8s linear infinite;
            filter: blur(20px);
        }

        .particles {
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: radial-gradient(2px 2px at 20px 30px, #eee, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 40px 70px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 50px 160px, #ddd, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 130px 80px, #fff, rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 200px 200px;
            animation: float-up 20s linear infinite;
            opacity: 0.3;
            mix-blend-mode: overlay;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg) scale(1.1);
            }

            0% {
                transform: rotate(0deg) scale(0.9);
            }
        }

        @keyframes spin-reverse {
            100% {
                transform: rotate(-360deg);
            }
        }

        @keyframes pulse-inner {
            0% {
                transform: scale(0.8);
                opacity: 0.6;
            }

            100% {
                transform: scale(1.2);
                opacity: 1;
            }
        }

        @keyframes float-up {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 0 -200px;
            }
        }
    </style>
</head>

<body>
    <svg>
        <filter id="liquid-filter">
            <feTurbulence type="fractalNoise" baseFrequency="0.015" numOctaves="3" result="noise" id="turbulence">
                <animate attributeName="baseFrequency" values="0.015;0.025;0.015" dur="10s" repeatCount="indefinite" />
            </feTurbulence>
            <feDisplacementMap in="SourceGraphic" in2="noise" scale="50" xChannelSelector="R" yChannelSelector="G" />
        </filter>
    </svg>

    <div class="portal-container">
        <div class="portal-core"></div>
        <div class="portal-core-inner"></div>
    </div>
    <div class="particles"></div>

    <script>
        // Smoothly animate turbulence base frequency to ensure perfect looping within an 8-10s window
        const turbulence = document.getElementById('turbulence');
        // Actually, css animation on SVG handles it.
    </script>
</body>

</html>
