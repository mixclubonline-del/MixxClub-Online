<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Booth Loop</title>
    <style>
        :root {
            --gold: #d4af37;
            --gold-bright: #ffd700;
            --bg: #09090b;
            --panel: #18181b;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            overflow: hidden;
            font-family: monospace;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at 50% 50%, rgba(212, 175, 55, 0.1), transparent 80%);
        }

        /* 3D Rack Container */
        .rack-container {
            width: 120%;
            height: 150%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transform: perspective(1000px) rotateY(-15deg) rotateX(5deg) scale(1.1);
            transform-style: preserve-3d;
            animation: slowDrift 20s ease-in-out infinite alternate;
        }

        @keyframes slowDrift {
            0% {
                transform: perspective(1000px) rotateY(-15deg) rotateX(5deg) scale(1.1) translateY(-5%);
            }

            100% {
                transform: perspective(1000px) rotateY(-5deg) rotateX(2deg) scale(1.1) translateY(5%);
            }
        }

        /* Server/Outboard Gear Rack Unit */
        .rack-unit {
            width: 90%;
            max-width: 800px;
            height: 120px;
            background: linear-gradient(180deg, #27272a, #18181b);
            border: 2px solid #3f3f46;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8), inset 0 2px 5px rgba(255, 255, 255, 0.05);
            display: flex;
            padding: 15px 30px;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }

        /* Rack Ears */
        .rack-ear {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 20px;
            background: #1f1f22;
            border-right: 1px solid #3f3f46;
            border-left: 1px solid #18181b;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            z-index: 10;
        }

        .rack-ear.left {
            left: 0;
        }

        .rack-ear.right {
            right: 0;
        }

        .screw {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #52525b;
            box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.8);
        }

        /* Gear Interface */
        .gear-face {
            flex: 1;
            margin: 0 10px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
            z-index: 5;
        }

        /* Indicator Lights */
        .led-panel {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #000;
            padding: 10px;
            border-radius: 4px;
            border: 1px solid #27272a;
        }

        .led-row {
            display: flex;
            gap: 4px;
        }

        .led {
            width: 8px;
            height: 12px;
            border-radius: 2px;
            background: #27272a;
            box-shadow: inset 0 1px 2px rgba(0, 0, 0, 0.8);
            transition: all 0.1s;
        }

        .led.active {
            background: var(--gold);
            box-shadow: 0 0 8px var(--gold-bright);
        }

        .led.active-red {
            background: #ef4444;
            box-shadow: 0 0 8px #ef4444;
        }

        /* VU Meter (Round) */
        .vu-meter {
            width: 70px;
            height: 50px;
            background: #e4e4e7;
            border-radius: 4px 4px 50px 50px;
            border: 3px solid #18181b;
            box-shadow: inset 0 5px 10px rgba(0, 0, 0, 0.2), 0 0 15px rgba(212, 175, 55, 0.2);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .vu-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at bottom, #fff, #f4f4f5);
        }

        .vu-needle {
            width: 2px;
            height: 60px;
            background: #ef4444;
            position: absolute;
            bottom: -5px;
            transform-origin: bottom center;
            transform: rotate(-30deg);
            transition: transform 0.1s ease-out;
            z-index: 2;
        }

        .vu-light {
            position: absolute;
            top: 5px;
            width: 100%;
            height: 15px;
            background: linear-gradient(to bottom, rgba(212, 175, 55, 0.4), transparent);
            z-index: 3;
        }

        /* Vents */
        .vent-panel {
            display: flex;
            gap: 4px;
        }

        .vent-slot {
            width: 4px;
            height: 40px;
            background: #000;
            border-radius: 2px;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.8);
        }

        /* Gold accents */
        .gold-trim {
            position: absolute;
            bottom: 10px;
            left: 40px;
            right: 40px;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
            opacity: 0.5;
        }

        /* Flares */
        .flare {
            position: absolute;
            width: 150px;
            height: 2px;
            background: rgba(255, 215, 0, 0.4);
            box-shadow: 0 0 20px 5px rgba(212, 175, 55, 0.3);
            filter: blur(2px);
            transform: rotate(-45deg);
            animation: sweep 8s infinite linear;
            pointer-events: none;
            z-index: 20;
        }

        @keyframes sweep {
            0% {
                top: -100px;
                left: -100px;
            }

            100% {
                top: 200px;
                left: 1000px;
            }
        }
    </style>
</head>

<body>
    <div class="flare" style="animation-delay: 0s;"></div>
    <div class="flare" style="animation-delay: 4s;"></div>

    <div class="rack-container" id="rack">
        <!-- Units injected by JS -->
    </div>

    <script>
        const rack = document.getElementById('rack');
        const numUnits = 6;

        for (let i = 0; i < numUnits; i++) {
            const unit = document.createElement('div');
            unit.className = 'rack-unit';

            // Left Ear
            unit.innerHTML += `
                <div class="rack-ear left">
                    <div class="screw"></div>
                    <div class="screw"></div>
                </div>
            `;

            const face = document.createElement('div');
            face.className = 'gear-face';

            // Variation based on index
            if (i % 2 === 0) {
                // Compressor style (VU meters + knobs)
                face.innerHTML = `
                    <div class="vent-panel">
                        ${'<div class="vent-slot"></div>'.repeat(5)}
                    </div>
                    <div style="display:flex; gap:20px;">
                        <div class="vu-meter"><div class="vu-bg"></div><div class="vu-light"></div><div class="vu-needle" id="vu-${i}-1"></div></div>
                        <div class="vu-meter"><div class="vu-bg"></div><div class="vu-light"></div><div class="vu-needle" id="vu-${i}-2"></div></div>
                    </div>
                    <div class="led-panel" id="leds-${i}">
                        <div class="led-row">${'<div class="led"></div>'.repeat(8)}</div>
                        <div class="led-row">${'<div class="led"></div>'.repeat(8)}</div>
                    </div>
                `;
            } else {
                // Digital Processor style (Lots of LEDs)
                face.innerHTML = `
                    <div class="led-panel" id="leds-${i}">
                        <div class="led-row">${'<div class="led"></div>'.repeat(16)}</div>
                        <div class="led-row">${'<div class="led"></div>'.repeat(16)}</div>
                        <div class="led-row">${'<div class="led"></div>'.repeat(16)}</div>
                    </div>
                    <div class="vent-panel">
                        ${'<div class="vent-slot"></div>'.repeat(10)}
                    </div>
                `;
            }

            face.innerHTML += '<div class="gold-trim"></div>';
            unit.appendChild(face);

            // Right Ear
            unit.innerHTML += `
                <div class="rack-ear right">
                    <div class="screw"></div>
                    <div class="screw"></div>
                </div>
            `;

            rack.appendChild(unit);
        }

        // Animation Loop for indicators
        function animateGear() {
            const time = Date.now();
            const tick = Math.floor(time / 100);

            for (let i = 0; i < numUnits; i++) {
                // Animate VU Meters
                if (i % 2 === 0) {
                    const vu1 = document.getElementById(`vu-${i}-1`);
                    const vu2 = document.getElementById(`vu-${i}-2`);

                    // Simulating audio peaks
                    const targetAngle1 = -30 + Math.random() * 60;
                    const targetAngle2 = targetAngle1 + (Math.random() * 10 - 5); // Slightly different

                    vu1.style.transform = `rotate(${targetAngle1}deg)`;
                    vu2.style.transform = `rotate(${targetAngle2}deg)`;
                }

                // Animate LEDs
                const ledPanel = document.getElementById(`leds-${i}`);
                const rows = ledPanel.querySelectorAll('.led-row');

                rows.forEach((row, rIdx) => {
                    const leds = row.querySelectorAll('.led');

                    if (i % 2 === 0) {
                        // Level meter style
                        const level = Math.floor(Math.random() * leds.length);
                        leds.forEach((led, lIdx) => {
                            led.className = 'led';
                            if (lIdx < level) {
                                led.classList.add(lIdx > leds.length - 2 ? 'active-red' : 'active');
                            }
                        });
                    } else {
                        // Digital blinky style (network/processing activity)
                        leds.forEach((led, lIdx) => {
                            led.className = 'led';
                            // Pseudorandom blink based on time and position
                            if ((tick + i + rIdx + lIdx) % 7 === 0 || Math.random() < 0.05) {
                                led.classList.add('active');
                            }
                        });
                    }
                });
            }

            // Update relatively quickly to match audio reactivity
            setTimeout(() => requestAnimationFrame(animateGear), 80);
        }

        animateGear();
    </script>
</body>

</html>
